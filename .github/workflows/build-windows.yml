name: Windows Build
on:
  push:
    branches:
    - master
    - release/*
  pull_request:
    branches:
    - master

jobs:

  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Catch2 via vcpkg
      shell: pwsh
      run: |
        vcpkg install catch2:x64-windows
        echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" >> $env:GITHUB_ENV
        echo "VCPKG_TARGET_TRIPLET=x64-windows" >> $env:GITHUB_ENV

      # Setup/cache dependencies
    - name: Cache deps
      id: cache-deps-v8
      uses: actions/cache@v4
      with:
        path: |
          build/deps
          build/_deps
        key: ${{ runner.os }}-deps-v8

    - name: Configure Camada
      shell: pwsh
      # Windows is Z3-only, matching ESBMC's Windows CI. Bitwuzla's Windows
      # release is MinGW-built and its archives are not link-compatible with
      # MSVC; MathSAT's public header pulls in <gmp.h> but Windows has no
      # system GMP; CVC5's static Windows prebuilt declares bare-name
      # transitive deps (cadical, picpoly, picpolyxx, gmp) in its
      # cvc5Targets.cmake that don't ship as separate .lib files there.
      run: cmake -S . -B build -DCAMADA_ENABLE_REGRESSION=ON -DBUILD_SHARED_LIBS=OFF -DCAMADA_DOWNLOAD_DEPENDENCIES=ALL -DCAMADA_SOLVER_BITWUZLA_ENABLE=OFF -DCAMADA_SOLVER_CVC5_ENABLE=OFF -DCAMADA_SOLVER_MATHSAT_ENABLE=OFF -DCAMADA_SOLVER_STP_ENABLE=OFF -DCAMADA_SOLVER_YICES_ENABLE=OFF -DCAMADA_SOLVER_Z3_ENABLE=ON -DENABLE_WARNINGS=ON -DCMAKE_INSTALL_PREFIX:PATH=$env:GITHUB_WORKSPACE/release -DCMAKE_BUILD_TYPE=Debug

    - name: Build Camada
      shell: pwsh
      run: cmake --build build --config Debug --target install

    - name: Run tests
      shell: pwsh
      run: ctest --test-dir build -C Debug --output-on-failure
