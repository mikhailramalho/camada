name: Windows Build
on:
  push:
    branches:
    - master
    - release/*
  pull_request:
    branches:
    - master

jobs:

  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Catch2 via vcpkg
      shell: pwsh
      run: |
        vcpkg install catch2:x64-windows
        echo "CMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" >> $env:GITHUB_ENV
        echo "VCPKG_TARGET_TRIPLET=x64-windows" >> $env:GITHUB_ENV

    - name: Install pkg-config
      # FindBitwuzla.cmake reads bitwuzla.pc through pkg-config; without
      # it, Bitwuzla_LINK_LIBRARIES / Bitwuzla_INCLUDE_DIRS stay unset
      # and the Bitwuzla find fails. The chocolatey pkgconfiglite drop
      # puts pkg-config.exe on PATH where find_package(PkgConfig) sees
      # it. The community.chocolatey.org feed occasionally returns 504,
      # so retry a few times before giving up — and verify pkg-config
      # is actually installed afterwards (choco install can exit 0 with
      # "Chocolatey installed 0/0 packages" on a transient feed error).
      shell: pwsh
      run: |
        $attempt = 0
        $maxAttempts = 3
        while ($attempt -lt $maxAttempts) {
          $attempt++
          choco install pkgconfiglite --no-progress -y
          if ($LASTEXITCODE -eq 0 -and (Get-Command pkg-config -ErrorAction SilentlyContinue)) {
            Write-Host "pkg-config installed at: $((Get-Command pkg-config).Source)"
            exit 0
          }
          Write-Host "choco install attempt $attempt failed (exit $LASTEXITCODE); retrying..."
          Start-Sleep -Seconds 15
        }
        Write-Error "Failed to install pkgconfiglite after $maxAttempts attempts"
        exit 1

      # Setup/cache dependencies
    - name: Cache deps
      id: cache-deps-v8
      uses: actions/cache@v4
      with:
        path: |
          build/deps
          build/_deps
        key: ${{ runner.os }}-deps-v8

    - name: Configure Camada
      shell: pwsh
      run: cmake -S . -B build -DCAMADA_ENABLE_REGRESSION=ON -DBUILD_SHARED_LIBS=OFF -DCAMADA_DOWNLOAD_DEPENDENCIES=ALL -DCAMADA_SOLVER_BITWUZLA_ENABLE=ON -DCAMADA_SOLVER_CVC5_ENABLE=ON -DCAMADA_SOLVER_MATHSAT_ENABLE=ON -DCAMADA_SOLVER_STP_ENABLE=OFF -DCAMADA_SOLVER_YICES_ENABLE=OFF -DCAMADA_SOLVER_Z3_ENABLE=ON -DENABLE_WARNINGS=ON -DCMAKE_INSTALL_PREFIX:PATH=$env:GITHUB_WORKSPACE/release -DCMAKE_BUILD_TYPE=Debug

    - name: Build Camada
      shell: pwsh
      run: cmake --build build --config Debug --target install

    - name: Run tests
      shell: pwsh
      run: ctest --test-dir build -C Debug --output-on-failure
