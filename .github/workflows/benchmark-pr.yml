name: Benchmark PR

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  benchmark-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            pkg-config \
            libgmp-dev \
            libmpfr-dev \
            schedtool

      - name: Cache deps
        id: cache-deps-bench-v1
        uses: actions/cache@v4
        with:
          path: |
            build/deps
            build/_deps
          key: ${{ runner.os }}-bench-deps-v1

      - name: Download latest master baseline
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: benchmark-master.yml
          branch: master
          name: baseline-master
          path: scripts
          github_token: ${{ secrets.GITHUB_TOKEN }}
          if_no_artifact_found: fail

      - name: Configure Camada
        run: >
          cmake -S . -B build -GNinja
          -DCAMADA_ENABLE_REGRESSION=ON
          -DBUILD_SHARED_LIBS=OFF
          -DCAMADA_DOWNLOAD_DEPENDENCIES=ALL
          -DCAMADA_SOLVER_BITWUZLA_ENABLE=ON
          -DCAMADA_SOLVER_CVC5_ENABLE=OFF
          -DCAMADA_SOLVER_MATHSAT_ENABLE=OFF
          -DCAMADA_SOLVER_STP_ENABLE=OFF
          -DCAMADA_SOLVER_YICES_ENABLE=OFF
          -DCAMADA_SOLVER_Z3_ENABLE=OFF
          -DCMAKE_BUILD_TYPE=Release

      - name: Build Benchmark
        run: cmake --build build --target camada-bench

      - name: Run benchmark comparison
        run: >
          python3 scripts/compare-bench.py ./build/bin/camada-bench 200
          --baseline scripts/baseline-master.txt
          > benchmark-pr-comment.txt

      - name: Update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- camada-benchmark-comment -->';
            const result = fs.readFileSync('benchmark-pr-comment.txt', 'utf8').trim();
            const sha = context.payload.pull_request.head.sha;
            const shortSha = sha.slice(0, 12);
            const body = [
              marker,
              '## Benchmark Comparison',
              '',
              `Commit: \`${shortSha}\``,
              '',
              'Compared against `baseline-master.txt` generated from the latest successful `master` benchmark run.',
              '',
              '```text',
              result,
              '```',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
